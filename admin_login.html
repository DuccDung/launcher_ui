<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | NestG</title>
    <link rel="icon" type="image/png" href="./assets/img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body class="admin-auth-body admin-auth-body--simple">
    <div class="admin-auth-layout admin-auth-layout--simple">
      <section
        class="admin-auth-card admin-auth-card--simple"
        aria-labelledby="adminLoginTitle"
      >
        <div class="admin-brand admin-brand--simple">
          <div class="admin-brand__mark">
            <img src="./assets/img/logo.png" alt="NestG" />
          </div>
          <div class="admin-brand__copy">
            <span>NestG Console</span>
            <strong>NestG</strong>
          </div>
        </div>

        <span class="admin-auth-card__eyebrow">Secure Access</span>
        <h1 id="adminLoginTitle" class="admin-auth-card__title">Đăng nhập quản trị</h1>
        <p class="admin-auth-card__desc">
          Truy cập dashboard quản trị NestG bằng tài khoản nội bộ của bạn.
        </p>

        <form class="admin-auth-form" action="./admin_dashboard.html" method="get">
          <div class="admin-field">
            <label for="adminLoginEmail">Email quản trị</label>
            <input
              id="adminLoginEmail"
              type="email"
              name="admin_email"
              placeholder="admin@nestg.vn"
              autocomplete="username"
            />
          </div>

          <div class="admin-field">
            <label for="adminLoginPassword">Mật khẩu</label>
            <input
              id="adminLoginPassword"
              type="password"
              name="admin_password"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
            />
          </div>

          <div class="admin-check-row">
            <label class="admin-check">
              <input type="checkbox" checked />
              <span>Ghi nhớ đăng nhập</span>
            </label>

            <a href="#" class="admin-link">Quên mật khẩu?</a>
          </div>

          <button class="admin-button admin-button--primary" type="submit">
            <i class="bi bi-box-arrow-in-right"></i>
            Vào dashboard
          </button>
        </form>

        <div class="admin-auth-simple-note">
          Chỉ dành cho tài khoản quản trị NestG. Mọi phiên đăng nhập đều được ghi nhận.
        </div>

        <div class="admin-auth-footer">
          <a href="./index.html" class="admin-link">Quay về NestG Store</a>
          <span class="admin-font-mono">NestG Admin</span>
        </div>
      </section>
    </div>
  </body>
</html>
